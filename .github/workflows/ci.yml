name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands —
# saves CI minutes when pushing rapidly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest
        # No ANTHROPIC_API_KEY in CI → live_api tests skip automatically
        # (see tests/conftest.py). Only the deterministic jurisdiction rules
        # engine tests run here — fast (~3s), free, no flakiness from LLMs.
        run: uv run pytest tests/ -v
